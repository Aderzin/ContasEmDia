<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Conta em Dia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div style="background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center;">
        <h2 style="color: #2c3e50; margin-bottom: 0.5rem;">🔒 Conta em Dia</h2>
        <p style="color: #7f8c8d; margin-bottom: 1.5rem;">Área Restrita</p>

        {% if erro %}
            <p style="color: #e74c3c; background: #fdf2f2; padding: 10px; border-radius: 5px; font-size: 0.9rem;">{{ erro }}</p>
        {% endif %}

        <form action="/login" method="POST">
    <input type="email" name="email" placeholder="E-mail" required style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
    <input type="password" name="senha" placeholder="Senha" required style="width: 100%; padding: 12px; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
    <button type="submit" style="width: 100%; background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;">Entrar</button>
</form>
<p style="text-align: center; margin-top: 15px;"><a href="/registrar" style="color: #7f8c8d; text-decoration: none; font-size: 0.9rem;">Criar uma conta nova</a></p>
    </div>
</body>
</html>
