<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Conta em Dia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">
    <div style="background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 360px;">
        <h2 style="text-align: center; color: #2c3e50; margin-bottom: 5px;">🔒 Conta em Dia</h2>
        <p style="text-align: center; color: #7f8c8d; font-size: 0.9rem; margin-bottom: 25px;">Entre com seu e-mail individual</p>

        {% if erro %}
            <p style="color: #e74c3c; background: #fdf2f2; padding: 10px; border-radius: 6px; text-align: center; font-size: 0.9rem;">{{ erro }}</p>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">
            <input type="email" name="email" placeholder="Seu e-mail" required style="width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            <input type="password" name="senha" placeholder="Sua senha" required style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            <button type="submit" style="width: 100%; background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;">Acessar Painel</button>
        </form>
        <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;"><a href="{{ url_for('registrar') }}" style="color: #3498db; text-decoration: none;">Criar uma nova conta</a></p>
    </div>
</body>
</html>
